services:
  - type: web
    name: backend-mysgym
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    healthCheckPath: /api
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mysgym-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true

databases:
  - name: mysgym-db