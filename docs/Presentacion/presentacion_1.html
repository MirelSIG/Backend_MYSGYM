<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MYSGYM - Sistema de Gestión Integral para Gimnasios</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, sans-serif;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
    }

    .presentation {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #0f172a;
    }

    .slide {
      position: absolute;
      inset: 0;
      box-sizing: border-box;
      padding-bottom: 72px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease-in-out;
      background: #fff;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide img {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }

    .slide img {
      object-fit: contain;
    }

    .controls {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.82);
      color: #e2e8f0;
      backdrop-filter: blur(8px);
    }

    .controls button {
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      background: #1d4ed8;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    #prevBtn,
    #nextBtn,
    #fullscreenBtn {
      padding: 6px 10px;
      font-size: 12px;
    }

    .controls button:hover {
      background: #2563eb;
    }

    .counter {
      min-width: 64px;
      text-align: center;
      font-size: 14px;
    }

    .controls select {
      border: 0;
      border-radius: 999px;
      padding: 8px 10px;
      background: #334155;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="presentation" aria-label="Presentación MYSGYM">
    <section class="slide active" aria-label="Diapositiva 1">
      <img src="https://skyagent-artifacts.skywork.ai/image/2047269798879645696/9e9f76b3-14e9-40bf-b1dc-e944adda8551/prod_agent_2047269798879645696/ppt_nano_2047269839074951168_1.png" alt="Diapositiva 1 MYSGYM"/>
    </section>
    <section class="slide" aria-label="Diapositiva 2">
      <img src="https://skyagent-artifacts.skywork.ai/image/2047269798879645696/4a3905b0-5a0e-4ef0-b177-06b8ea4ff34d/prod_agent_2047269798879645696/ppt_nano_2047269839074951168_1.png" alt="Diapositiva 2 MYSGYM"/>
    </section>
    <section class="slide" aria-label="Diapositiva 3">
      <img src="https://skyagent-artifacts.skywork.ai/image/2047269798879645696/4ecaf9ef-3a13-4931-ac63-89cdb9e81f39/prod_agent_2047269798879645696/ppt_nano_2047269839074951168_1.png" alt="Diapositiva 3 MYSGYM"/>
    </section>
    <section class="slide" aria-label="Diapositiva 4">
      <img src="https://skyagent-artifacts.skywork.ai/image/2047269798879645696/d461fc41-efb6-476f-9ece-d73f9de01239/prod_agent_2047269798879645696/ppt_nano_2047269839074951168_1.png" alt="Diapositiva 4 MYSGYM"/>
    </section>
    <section class="slide" aria-label="Diapositiva 5">
      <img src="https://skyagent-artifacts.skywork.ai/image/2047269798879645696/544c37a3-82f8-46af-a28c-7e901ed44da9/prod_agent_2047269798879645696/ppt_nano_2047269839074951168_1.png" alt="Diapositiva 5 MYSGYM"/>
    </section>
    <section class="slide" aria-label="Diapositiva 6">
      <img src="https://skyagent-artifacts.skywork.ai/image/2047269798879645696/7ac6c9e3-39bf-444d-b76c-349711f749a6/prod_agent_2047269798879645696/ppt_nano_2047269839074951168_1.png" alt="Diapositiva 6 MYSGYM"/>
    </section>
    <section class="slide" aria-label="Diapositiva 7">
      <img src="https://skyagent-artifacts.skywork.ai/image/2047269798879645696/af714657-754c-4ba4-b4db-655e023b9e7a/prod_agent_2047269798879645696/ppt_nano_2047269839074951168_1.png" alt="Diapositiva 7 MYSGYM"/>
    </section>
    <section class="slide" aria-label="Diapositiva 8">
      <img src="https://skyagent-artifacts.skywork.ai/image/2047269798879645696/45c25352-9fee-495a-b2fc-8c4c98e6bdc8/prod_agent_2047269798879645696/ppt_nano_2047269839074951168_1.png" alt="Diapositiva 8 MYSGYM"/>
    </section>
  </main>

  <div class="controls" role="group" aria-label="Controles de presentación">
    <button type="button" id="prevBtn">Anterior</button>
    <div class="counter" id="counter">1 / 8</div>
    <button type="button" id="nextBtn">Siguiente</button>
    <select id="intervalSelect" aria-label="Intervalo de autoplay">
      <option value="3000">3s</option>
      <option value="5000" selected>5s</option>
      <option value="8000">8s</option>
      <option value="10000">10s</option>
    </select>
    <button type="button" id="autoplayBtn" aria-pressed="false">Iniciar autoplay</button>
    <button type="button" id="fullscreenBtn">Pantalla completa</button>
  </div>

  <script>
    const slides = Array.from(document.querySelectorAll('.slide'));
    const counter = document.getElementById('counter');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const intervalSelect = document.getElementById('intervalSelect');
    const autoplayBtn = document.getElementById('autoplayBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    let currentIndex = 0;
    let autoplayTimer = null;

    function showSlide(index) {
      currentIndex = (index + slides.length) % slides.length;
      slides.forEach((slide, slideIndex) => {
        slide.classList.toggle('active', slideIndex === currentIndex);
      });
      counter.textContent = `${currentIndex + 1} / ${slides.length}`;
    }

    prevBtn.addEventListener('click', () => showSlide(currentIndex - 1));
    nextBtn.addEventListener('click', () => showSlide(currentIndex + 1));

    function startAutoplay() {
      stopAutoplay();
      const delay = Number(intervalSelect.value);
      autoplayTimer = setInterval(() => {
        showSlide(currentIndex + 1);
      }, delay);
      autoplayBtn.textContent = 'Pausar autoplay';
      autoplayBtn.setAttribute('aria-pressed', 'true');
    }

    function stopAutoplay() {
      if (autoplayTimer) {
        clearInterval(autoplayTimer);
        autoplayTimer = null;
      }
      autoplayBtn.textContent = 'Iniciar autoplay';
      autoplayBtn.setAttribute('aria-pressed', 'false');
    }

    autoplayBtn.addEventListener('click', () => {
      if (autoplayTimer) {
        stopAutoplay();
      } else {
        startAutoplay();
      }
    });

    intervalSelect.addEventListener('change', () => {
      if (autoplayTimer) {
        startAutoplay();
      }
    });

    fullscreenBtn.addEventListener('click', async () => {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
        fullscreenBtn.textContent = 'Salir pantalla completa';
      } else {
        await document.exitFullscreen();
        fullscreenBtn.textContent = 'Pantalla completa';
      }
    });

    document.addEventListener('fullscreenchange', () => {
      fullscreenBtn.textContent = document.fullscreenElement
        ? 'Salir pantalla completa'
        : 'Pantalla completa';
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowLeft') {
        showSlide(currentIndex - 1);
      }

      if (event.key === 'ArrowRight' || event.key === 'PageDown' || event.key === ' ') {
        event.preventDefault();
        showSlide(currentIndex + 1);
      }

      if (event.key.toLowerCase() === 'f') {
        fullscreenBtn.click();
      }

      if (event.key.toLowerCase() === 'a') {
        autoplayBtn.click();
      }
    });
  </script>
</body>
</html>
